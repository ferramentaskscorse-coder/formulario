<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel · KlareIA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --preto: #0F0F0F;
    --branco: #F9F7F4;
    --marrom: #4f2c1d;
    --laranja: #BE4D00;
    --dourado: #C9A84C;
    --cinza-suave: #E8E5DF;
    --cinza-medio: #9A9590;
    --cinza-escuro: #3A3835;

    --status-aguardando: #E8A838;
    --status-andamento: #4A7C9E;
    --status-enviada: #7B6FAB;
    --status-converteu: #4A7C59;
    --status-nao: #C0392B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--branco); font-family: 'Inter', sans-serif; color: var(--preto); min-height: 100vh; }

  /* LOGIN */
  .login-tela {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--marrom);
    padding: 24px;
  }

  .login-box {
    background: white;
    padding: 48px 40px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }

  .login-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--laranja);
    margin-bottom: 12px;
  }

  .login-titulo {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--preto);
    margin-bottom: 32px;
  }

  .login-input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--cinza-suave);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 0.2em;
  }

  .login-input:focus { border-color: var(--laranja); }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: var(--marrom);
    color: white;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }

  .login-btn:hover { background: var(--preto); }

  .login-erro {
    font-size: 12px;
    color: var(--status-nao);
    margin-top: 10px;
    display: none;
  }

  /* PAINEL */
  .painel { display: none; }
  .painel.visivel { display: block; }

  /* HEADER */
  .header {
    background: var(--marrom);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-marca {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: #BE4D00;
  }

  .header-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-acoes {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-atualizar {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 14px;
    transition: all 0.2s;
  }

  .header-atualizar:hover {
    color: white;
    border-color: rgba(255,255,255,0.5);
  }

  .header-sair {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .header-sair:hover { color: white; }

  /* CONTAINER */
  .container { max-width: 1100px; margin: 0 auto; padding: 40px 32px; }

  /* CARDS MACRO */
  .macro {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  .macro-card {
    background: white;
    border: 1px solid var(--cinza-suave);
    border-top: 3px solid var(--cinza-suave);
    padding: 20px 20px 16px;
  }

  .macro-card.total { border-top-color: var(--marrom); }
  .macro-card.aguardando { border-top-color: var(--status-aguardando); }
  .macro-card.andamento { border-top-color: var(--status-andamento); }
  .macro-card.enviada { border-top-color: var(--status-enviada); }
  .macro-card.converteu { border-top-color: var(--status-converteu); }
  .macro-card.nao { border-top-color: var(--status-nao); }

  .macro-num {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--preto);
    line-height: 1;
    margin-bottom: 6px;
  }

  .macro-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--cinza-medio);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* FILTROS */
  .filtros {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .filtro-btn {
    padding: 8px 16px;
    background: white;
    border: 1.5px solid var(--cinza-suave);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--cinza-medio);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.06em;
  }

  .filtro-btn:hover, .filtro-btn.ativo {
    border-color: var(--marrom);
    color: var(--marrom);
    background: #FDF5F2;
  }

  /* TABELA / LISTA */
  .lista-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .lista-titulo {
    font-size: 13px;
    font-weight: 600;
    color: var(--cinza-escuro);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .lista-total {
    font-size: 12px;
    color: var(--cinza-medio);
  }

  .lead-card {
    background: white;
    border: 1px solid var(--cinza-suave);
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .lead-card:hover { border-color: var(--dourado); }

  .lead-topo {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    cursor: pointer;
  }

  .lead-avatar {
    width: 40px;
    height: 40px;
    background: var(--marrom);
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .lead-info { flex: 1; min-width: 0; }

  .lead-nome {
    font-size: 15px;
    font-weight: 600;
    color: var(--preto);
    margin-bottom: 2px;
  }

  .lead-meta {
    font-size: 12px;
    color: var(--cinza-medio);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .lead-status-badge {
    padding: 4px 10px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 2px;
    white-space: nowrap;
  }

  .badge-aguardando_analise { background: #FEF3DC; color: var(--status-aguardando); }
  .badge-analise_enviada { background: #EDE9F7; color: var(--status-enviada); }
  .badge-em_andamento { background: #E0EEF5; color: var(--status-andamento); }
  .badge-converteu { background: #E3F2E9; color: var(--status-converteu); }
  .badge-nao_converteu { background: #FDECEA; color: var(--status-nao); }

  .lead-seta {
    font-size: 18px;
    color: var(--cinza-medio);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .lead-card.aberto .lead-seta { transform: rotate(180deg); }

  /* DETALHE */
  .lead-detalhe {
    display: none;
    border-top: 1px solid var(--cinza-suave);
    padding: 20px;
  }

  .lead-card.aberto .lead-detalhe { display: block; }

  .detalhe-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .detalhe-bloco {
    background: var(--branco);
    padding: 16px;
    border-left: 3px solid var(--dourado);
  }

  .detalhe-bloco.dor { border-left-color: var(--status-nao); }
  .detalhe-bloco.dado { border-left-color: var(--status-andamento); }
  .detalhe-bloco.decisao { border-left-color: var(--status-converteu); }

  .detalhe-tag {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cinza-medio);
    margin-bottom: 10px;
  }

  .detalhe-item {
    margin-bottom: 10px;
  }

  .detalhe-item:last-child { margin-bottom: 0; }

  .detalhe-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--cinza-medio);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .detalhe-valor {
    font-size: 13px;
    color: var(--cinza-escuro);
    line-height: 1.5;
  }

  /* STATUS SELECT */
  .status-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 16px;
    border-top: 1px solid var(--cinza-suave);
  }

  .status-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--cinza-medio);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .status-select {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--cinza-suave);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--preto);
    outline: none;
    cursor: pointer;
    background: white;
    -webkit-appearance: none;
  }

  .status-select:focus { border-color: var(--laranja); }

  .status-salvar {
    padding: 10px 20px;
    background: var(--marrom);
    color: white;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .status-salvar:hover { background: var(--preto); }
  .status-salvar.salvo { background: var(--status-converteu); }

  .btn-excluir {
    padding: 10px 16px;
    background: transparent;
    color: var(--status-nao);
    border: 1.5px solid var(--status-nao);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-excluir:hover {
    background: var(--status-nao);
    color: white;
  }
  .vazio {
    text-align: center;
    padding: 60px 24px;
    color: var(--cinza-medio);
  }

  .vazio-icon { font-size: 40px; margin-bottom: 16px; }
  .vazio-texto { font-size: 14px; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--cinza-medio);
    font-size: 14px;
  }

  @media (max-width: 600px) {
    .container { padding: 24px 16px; }
    .header { padding: 20px 16px; }
    .detalhe-grid { grid-template-columns: 1fr; }
    .macro { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-tela" id="login-tela">
  <div class="login-box">
    <div class="login-eyebrow">KlareIA · Painel</div>
    <h1 class="login-titulo">Acesso restrito</h1>
    <input type="password" class="login-input" id="login-senha" placeholder="••••••" onkeydown="if(event.key==='Enter') entrar()" />
    <button class="login-btn" onclick="entrar()">Entrar</button>
    <div class="login-erro" id="login-erro">Senha incorreta.</div>
  </div>
</div>

<!-- PAINEL -->
<div class="painel" id="painel">

  <div class="header">
    <div>
      <div class="header-marca">KlareIA</div>
      <div class="header-sub">Painel · Diagnóstico DDD</div>
    </div>
    <div class="header-acoes">
      <button class="header-atualizar" onclick="carregarLeads()">↻ Atualizar</button>
      <button class="header-sair" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="container">

    <!-- MACRO -->
    <div class="macro">
      <div class="macro-card total">
        <div class="macro-num" id="num-total">—</div>
        <div class="macro-label">Total</div>
      </div>
      <div class="macro-card aguardando">
        <div class="macro-num" id="num-aguardando">—</div>
        <div class="macro-label">Aguardando</div>
      </div>
      <div class="macro-card enviada">
        <div class="macro-num" id="num-enviada">—</div>
        <div class="macro-label">Análise enviada</div>
      </div>
      <div class="macro-card andamento">
        <div class="macro-num" id="num-andamento">—</div>
        <div class="macro-label">Em andamento</div>
      </div>
      <div class="macro-card converteu">
        <div class="macro-num" id="num-converteu">—</div>
        <div class="macro-label">Converteu</div>
      </div>
      <div class="macro-card nao">
        <div class="macro-num" id="num-nao">—</div>
        <div class="macro-label">Não converteu</div>
      </div>
    </div>

    <!-- FILTROS -->
    <div class="filtros">
      <button class="filtro-btn ativo" onclick="filtrar('todos', this)">Todos</button>
      <button class="filtro-btn" onclick="filtrar('aguardando_analise', this)">Aguardando</button>
      <button class="filtro-btn" onclick="filtrar('analise_enviada', this)">Análise enviada</button>
      <button class="filtro-btn" onclick="filtrar('em_andamento', this)">Em andamento</button>
      <button class="filtro-btn" onclick="filtrar('converteu', this)">Converteu</button>
      <button class="filtro-btn" onclick="filtrar('nao_converteu', this)">Não converteu</button>
    </div>

    <!-- LISTA -->
    <div class="lista-header">
      <span class="lista-titulo">Leads</span>
      <span class="lista-total" id="lista-total"></span>
    </div>

    <div id="lista-leads">
      <div class="loading">Carregando leads...</div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA4a47SVBcyC2oC2S0AgzYVVPdPpXVrPMw",
    authDomain: "formularioentrada.firebaseapp.com",
    projectId: "formularioentrada",
    storageBucket: "formularioentrada.firebasestorage.app",
    messagingSenderId: "719149040677",
    appId: "1:719149040677:web:47e65c4ba4a93422766bcc"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const SENHA = "050431";
  let todosLeads = [];
  let filtroAtual = 'todos';
  let origemAtual = 'todos';

  // LOGIN
  window.entrar = function() {
    const senha = document.getElementById('login-senha').value;
    if (senha === SENHA) {
      document.getElementById('login-tela').style.display = 'none';
      document.getElementById('painel').classList.add('visivel');
      window.carregarLeads();
    } else {
      document.getElementById('login-erro').style.display = 'block';
      document.getElementById('login-senha').value = '';
    }
  };

  window.sair = function() {
    document.getElementById('login-tela').style.display = 'flex';
    document.getElementById('painel').classList.remove('visivel');
    document.getElementById('login-senha').value = '';
  };

  // CARREGAR LEADS — duas coleções
  window.carregarLeads = async function() {
    try {
      document.getElementById('lista-leads').innerHTML = '<div class="loading">Carregando leads...</div>';

      const [snapDDD, snapMini] = await Promise.all([
        getDocs(query(collection(db, 'leads_mapa_caos'), orderBy('timestamp', 'desc'))),
        getDocs(query(collection(db, 'leads_mini_diagnostico'), orderBy('timestamp', 'desc')))
      ]);

      const leadsDDD = snapDDD.docs.map(d => ({ id: d.id, colecao: 'leads_mapa_caos', origem: 'mapa-do-caos', ...d.data() }));
      const leadsMini = snapMini.docs.map(d => ({ id: d.id, colecao: 'leads_mini_diagnostico', origem: 'mini-diagnostico', ...d.data() }));

      todosLeads = [...leadsDDD, ...leadsMini].sort((a, b) => {
        const ta = a.timestamp?.toDate?.() || new Date(0);
        const tb = b.timestamp?.toDate?.() || new Date(0);
        return tb - ta;
      });

      atualizarMacro();
      aplicarFiltros();
    } catch(e) {
      document.getElementById('lista-leads').innerHTML = '<div class="loading">Erro ao carregar. Verifique as regras do Firestore.</div>';
    }
  };

  function aplicarFiltros() {
    let resultado = todosLeads;
    if (filtroAtual !== 'todos') resultado = resultado.filter(l => (l.status || 'aguardando_analise') === filtroAtual);
    if (origemAtual !== 'todos') resultado = resultado.filter(l => l.origem === origemAtual);
    renderizarLista(resultado);
  }

  window.filtrarOrigem = function(origem, btn) {
    origemAtual = origem;
    document.querySelectorAll('[id^="origem-"]').forEach(b => b.classList.remove('ativo'));
    btn.classList.add('ativo');
    aplicarFiltros();
  };

  // MACRO
  function atualizarMacro() {
    const contagem = {
      total: todosLeads.length,
      aguardando_analise: 0,
      analise_enviada: 0,
      em_andamento: 0,
      converteu: 0,
      nao_converteu: 0
    };

    todosLeads.forEach(l => {
      const s = l.status || 'aguardando_analise';
      if (contagem[s] !== undefined) contagem[s]++;
    });

    document.getElementById('num-total').textContent = contagem.total;
    document.getElementById('num-aguardando').textContent = contagem.aguardando_analise;
    document.getElementById('num-enviada').textContent = contagem.analise_enviada;
    document.getElementById('num-andamento').textContent = contagem.em_andamento;
    document.getElementById('num-converteu').textContent = contagem.converteu;
    document.getElementById('num-nao').textContent = contagem.nao_converteu;
  }

  // FILTRAR
  window.filtrar = function(status, btn) {
    filtroAtual = status;
    document.querySelectorAll('.filtro-btn:not([id^="origem-"])').forEach(b => b.classList.remove('ativo'));
    btn.classList.add('ativo');
    aplicarFiltros();
  };

  // RENDERIZAR
  function renderizarLista(leads) {
    const container = document.getElementById('lista-leads');
    document.getElementById('lista-total').textContent = leads.length + ' lead' + (leads.length !== 1 ? 's' : '');

    if (leads.length === 0) {
      container.innerHTML = '<div class="vazio"><div class="vazio-icon">📭</div><div class="vazio-texto">Nenhum lead aqui ainda.</div></div>';
      return;
    }

    container.innerHTML = leads.map(lead => {
      const status = lead.status || 'aguardando_analise';
      const inicial = (lead.nome || '?')[0].toUpperCase();
      const data = lead.timestamp?.toDate ? lead.timestamp.toDate().toLocaleDateString('pt-BR') : '—';
      const onde = Array.isArray(lead.dado_onde) ? lead.dado_onde.join(', ') : (lead.dado_onde || '—');

      return `
        <div class="lead-card" id="card-${lead.id}">
          <div class="lead-topo" onclick="toggleCard('${lead.id}')">
            <div class="lead-avatar">${inicial}</div>
            <div class="lead-info">
              <div class="lead-nome">${lead.nome || '—'}</div>
              <div class="lead-meta">
                <span>📱 ${lead.whatsapp || '—'}</span>
                <span>🏪 ${lead.negocio || '—'}</span>
                <span>📅 ${data}</span>
              </div>
            </div>
            <span class="lead-status-badge badge-${status}">${statusLabel(status)}</span>
            <span class="lead-seta">▾</span>
          </div>

          <div class="lead-detalhe">
            <div class="detalhe-grid">

              <div class="detalhe-bloco dor">
                <div class="detalhe-tag">D · Dor</div>
                <div class="detalhe-item">
                  <div class="detalhe-label">O que está pesando</div>
                  <div class="detalhe-valor">${lead.dor_descricao || '—'}</div>
                </div>
                <div class="detalhe-item">
                  <div class="detalhe-label">Está custando mais em</div>
                  <div class="detalhe-valor">${lead.dor_custo || '—'}</div>
                </div>
              </div>

              <div class="detalhe-bloco dado">
                <div class="detalhe-tag">D · Dado</div>
                <div class="detalhe-item">
                  <div class="detalhe-label">Registra informações</div>
                  <div class="detalhe-valor">${lead.dado_registra || '—'}</div>
                </div>
                <div class="detalhe-item">
                  <div class="detalhe-label">Onde registra</div>
                  <div class="detalhe-valor">${onde}</div>
                </div>
                <div class="detalhe-item">
                  <div class="detalhe-label">Sabe quanto sobrou</div>
                  <div class="detalhe-valor">${lead.dado_sobrou || '—'}</div>
                </div>
              </div>

              <div class="detalhe-bloco decisao">
                <div class="detalhe-tag">D · Decisão</div>
                <div class="detalhe-item">
                  <div class="detalhe-label">Como decide</div>
                  <div class="detalhe-valor">${lead.decisao_base || '—'}</div>
                </div>
                <div class="detalhe-item">
                  <div class="detalhe-label">Decisão travada</div>
                  <div class="detalhe-valor">${lead.decisao_travada || '—'}</div>
                </div>
              </div>

            </div>

            <div class="status-row">
              <span class="status-label">Status</span>
              <select class="status-select" id="select-${lead.id}">
                <option value="aguardando_analise" ${status === 'aguardando_analise' ? 'selected' : ''}>⏳ Aguardando análise</option>
                <option value="analise_enviada" ${status === 'analise_enviada' ? 'selected' : ''}>📤 Análise enviada</option>
                <option value="em_andamento" ${status === 'em_andamento' ? 'selected' : ''}>🔄 Em andamento</option>
                <option value="converteu" ${status === 'converteu' ? 'selected' : ''}>✅ Converteu pra consultoria</option>
                <option value="nao_converteu" ${status === 'nao_converteu' ? 'selected' : ''}>❌ Não converteu</option>
              </select>
              <button class="status-salvar" id="btn-${lead.id}" onclick="salvarStatus('${lead.id}')">Salvar</button>
              <button class="btn-excluir" onclick="excluirLead('${lead.id}', '${lead.nome}')">Excluir</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  window.toggleCard = function(id) {
    document.getElementById('card-' + id).classList.toggle('aberto');
  };

  window.salvarStatus = async function(id) {
    const lead = todosLeads.find(l => l.id === id);
    const colecao = lead?.colecao || 'leads_mapa_caos';
    const select = document.getElementById('select-' + id);
    const btn = document.getElementById('btn-' + id);
    const novoStatus = select.value;

    btn.textContent = '...';
    btn.disabled = true;

    try {
      await updateDoc(doc(db, colecao, id), { status: novoStatus });
      if (lead) lead.status = novoStatus;

      const card = document.getElementById('card-' + id);
      const badge = card.querySelector('.lead-status-badge');
      badge.className = 'lead-status-badge badge-' + novoStatus;
      badge.textContent = statusLabel(novoStatus);

      btn.textContent = 'Salvo ✓';
      btn.classList.add('salvo');
      setTimeout(() => {
        btn.textContent = 'Salvar';
        btn.classList.remove('salvo');
        btn.disabled = false;
      }, 2000);

      atualizarMacro();
    } catch(e) {
      btn.textContent = 'Erro';
      btn.disabled = false;
    }
  };

  window.excluirLead = async function(id, nome) {
    if (!confirm(`Excluir o lead de "${nome}"? Essa ação não pode ser desfeita.`)) return;
    const lead = todosLeads.find(l => l.id === id);
    const colecao = lead?.colecao || 'leads_mapa_caos';

    try {
      await deleteDoc(doc(db, colecao, id));
      todosLeads = todosLeads.filter(l => l.id !== id);
      atualizarMacro();
      aplicarFiltros();
    } catch(e) {
      alert('Erro ao excluir. Tente novamente.');
    }
  };

  function statusLabel(s) {
    const labels = {
      aguardando_analise: 'Aguardando',
      analise_enviada: 'Análise enviada',
      em_andamento: 'Em andamento',
      converteu: 'Converteu',
      nao_converteu: 'Não converteu'
    };
    return labels[s] || s;
  }
</script>
</body>
</html>
